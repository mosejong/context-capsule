<svg xmlns="http://www.w3.org/2000/svg" width="980" height="420" viewBox="0 0 980 420" role="img" aria-labelledby="title desc">
  <title id="title">Agent README Comparison Spot Check</title>
  <desc id="desc">A bar chart comparing raw prompts and Context Capsule prompts across Haiku, Sonnet, and Opus README rewrite outputs.</desc>
  <style>
    .bg { fill: #ffffff; }
    .title { font: 700 26px Arial, sans-serif; fill: #111827; }
    .sub { font: 14px Arial, sans-serif; fill: #64748b; }
    .label { font: 13px Arial, sans-serif; fill: #334155; }
    .score { font: 700 14px Arial, sans-serif; fill: #111827; }
    .raw { fill: #fca5a5; }
    .capsule { fill: #60a5fa; }
    .axis { stroke: #cbd5e1; stroke-width: 1; }
    .note { font: 12px Arial, sans-serif; fill: #64748b; }
  </style>
  <rect class="bg" width="980" height="420"/>
  <text x="36" y="46" class="title">Raw Prompt vs Context Capsule README Rewrite</text>
  <text x="36" y="72" class="sub">Small qualitative spot check. Total score out of 25. Ground-truth accuracy value: 98.08%.</text>
  <line x1="220" y1="350" x2="920" y2="350" class="axis"/>
  <line x1="220" y1="110" x2="220" y2="350" class="axis"/>

  <text x="56" y="132" class="label">Haiku + Raw</text>
  <rect x="220" y="116" width="364" height="20" rx="5" class="raw"/>
  <text x="596" y="132" class="score">13/25</text>

  <text x="56" y="168" class="label">Haiku + Capsule</text>
  <rect x="220" y="152" width="504" height="20" rx="5" class="capsule"/>
  <text x="736" y="168" class="score">18/25</text>

  <text x="56" y="204" class="label">Sonnet + Raw</text>
  <rect x="220" y="188" width="504" height="20" rx="5" class="raw"/>
  <text x="736" y="204" class="score">18/25</text>

  <text x="56" y="240" class="label">Sonnet + Capsule</text>
  <rect x="220" y="224" width="532" height="20" rx="5" class="capsule"/>
  <text x="764" y="240" class="score">19/25</text>

  <text x="56" y="276" class="label">Opus + Raw</text>
  <rect x="220" y="260" width="616" height="20" rx="5" class="raw"/>
  <text x="848" y="276" class="score">22/25</text>

  <text x="56" y="312" class="label">Opus + Capsule</text>
  <rect x="220" y="296" width="700" height="20" rx="5" class="capsule"/>
  <text x="932" y="312" class="score">25/25</text>

  <rect x="36" y="366" width="16" height="16" rx="3" class="raw"/>
  <text x="60" y="379" class="note">Raw prompt/context</text>
  <rect x="200" y="366" width="16" height="16" rx="3" class="capsule"/>
  <text x="224" y="379" class="note">Context Capsule handoff prompt</text>
  <text x="36" y="404" class="note">Interpretation: Capsule improved factual preservation in this spot check, but did not eliminate hallucinated paths.</text>
</svg>
