  <text x="866" y="112" class="metric">84.0%</text>
  <text x="290" y="144" class="detail">raw 3,024 -> capsule 485 tokens | hit 100.0% | scope escape no</text>
  <circle cx="852" cy="140" r="6" fill="#16a34a" />
